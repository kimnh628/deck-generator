    'people': 'Busts%20in%20silhouette/3D/busts_in_silhouette_3d.png',
    'tv': 'Television/3D/television_3d.png',
    'joystick': 'Joystick/3D/joystick_3d.png',
  };

  async function fetchEmoji(name) {
    const path = EMOJI_MAP[name];
    if (!path) return null;
    try {
      const res = await fetch(EMOJI_CDN + path);
      const buf = await res.arrayBuffer();
      return Array.from(new Uint8Array(buf));
    } catch { return null; }
  }

  function collectEmojis(data) {
    const emojis = new Set();
    function walk(obj) {
      if (!obj) return;
      if (typeof obj === 'object') {
        if (obj.emoji) emojis.add(obj.emoji);
        Object.values(obj).forEach(walk);
      }
      if (Array.isArray(obj)) obj.forEach(walk);
    }
    walk(data);
    return [...emojis];
  }

  function collectImageUrls(data) {
    const urls = new Set();
    function walk(obj) {
      if (!obj) return;
      if (typeof obj === 'object') {
        if (obj.imageUrl) urls.add(obj.imageUrl);
        Object.values(obj).forEach(walk);
      }
      if (Array.isArray(obj)) obj.forEach(walk);
    }
    walk(data);
    return [...urls];
  }

  async function fetchImage(url) {
    try {
      const res = await fetch(url);
      const buf = await res.arrayBuffer();
      return Array.from(new Uint8Array(buf));
    } catch { return null; }
  }

  document.getElementById('generate').addEventListener('click', async () => {
    const raw = document.getElementById('json').value;
    try {
      const data = JSON.parse(raw);
      const emojiNames = collectEmojis(data);
      const emojiBytes = {};
      for (const name of emojiNames) {
        const bytes = await fetchEmoji(name);
        if (bytes) emojiBytes[name] = bytes;
      }
      const imageUrls = collectImageUrls(data);
      const imageBytes = {};
      for (const url of imageUrls) {
        const bytes = await fetchImage(url);
        if (bytes) imageBytes[url] = bytes;
      }
      parent.postMessage({ pluginMessage: { type: 'generate', data, emojiBytes, imageBytes } }, '*');
    } catch (err) {
      parent.postMessage({ pluginMessage: { type: 'error', message: 'Invalid JSON: ' + err.message } }, '*');
    }
  });
