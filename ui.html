        { kind: 'stat-hero', title: 'HbA1c \uAC10\uC18C', stat: '-1.7%p', sub: '8.2% \u2192 6.5% (12\uAC1C\uC6D4)' }

  document.getElementById('preset').addEventListener('change', (e) => {
    const val = e.target.value;
    if (presets[val]) {
      document.getElementById('json').value = JSON.stringify(presets[val], null, 2);
    }
  });

  document.getElementById('json').addEventListener('input', () => {
    document.getElementById('preset').value = '';
  });

  const EMOJI_CDN = 'https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/';
  const EMOJI_MAP = {
    'waving_hand': 'Waving%20hand/Default/3D/waving_hand_3d_default.png',
    'game_die': 'Game%20die/3D/game_die_3d.png',
    'glowing_star': 'Glowing%20star/3D/glowing_star_3d.png',
    'growing_heart': 'Growing%20heart/3D/growing_heart_3d.png',
    'fire': 'Fire/3D/fire_3d.png',
    'globe': 'Globe%20with%20meridians/3D/globe_with_meridians_3d.png',
    'hospital': 'Hospital/3D/hospital_3d.png',
    'mobile_phone': 'Mobile%20phone/3D/mobile_phone_3d.png',
    'chart_increasing': 'Chart%20increasing/3D/chart_increasing_3d.png',
    'money_wings': 'Money%20with%20wings/3D/money_with_wings_3d.png',
    'broken_heart': 'Broken%20heart/3D/broken_heart_3d.png',
    'sleeping': 'Sleeping%20face/3D/sleeping_face_3d.png',
    'rocket': 'Rocket/3D/rocket_3d.png',
    'sparkles': 'Sparkles/3D/sparkles_3d.png',
    'link': 'Link/3D/link_3d.png',
    'movie': 'Clapper%20board/3D/clapper_board_3d.png',
    'speech': 'Speech%20balloon/3D/speech_balloon_3d.png',
    'clock': 'Alarm%20clock/3D/alarm_clock_3d.png',
    'robot': 'Robot/3D/robot_3d.png',
    'puzzle': 'Puzzle%20piece/3D/puzzle_piece_3d.png',
    'handshake': 'Handshake/3D/handshake_3d.png',
    'megaphone': 'Megaphone/3D/megaphone_3d.png',
    'target': 'Bullseye/3D/bullseye_3d.png',
    'gem': 'Gem%20stone/3D/gem_stone_3d.png',
    'people': 'Busts%20in%20silhouette/3D/busts_in_silhouette_3d.png',
    'tv': 'Television/3D/television_3d.png',
    'joystick': 'Joystick/3D/joystick_3d.png',
  };

  function guessEmojiPath(name) {
    // Convert snake_case to Title Case folder name
    const words = name.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1));
    const folder = words.join('%20');
    const file = name + '_3d';
    return folder + '/3D/' + file + '.png';
  }

  async function fetchEmoji(name) {
    const registered = EMOJI_MAP[name];
    const guessed = guessEmojiPath(name);
    const paths = registered ? [registered] : [guessed, guessed.replace('/3D/', '/Default/3D/')];
    for (const path of paths) {
      try {
        const res = await fetch(EMOJI_CDN + path);
        if (!res.ok) continue;
        const buf = await res.arrayBuffer();
        const arr = new Uint8Array(buf);
        if (arr.length < 100) continue;
        const isPng = arr[0] === 0x89 && arr[1] === 0x50;
        if (!isPng) continue;
        return Array.from(arr);
      } catch { continue; }
    }
    return null;
  }

  function collectEmojis(data) {
    const emojis = new Set();
    function walk(obj) {
      if (!obj) return;
      if (typeof obj === 'object') {
        if (obj.emoji) emojis.add(obj.emoji);
        Object.values(obj).forEach(walk);
      }
      if (Array.isArray(obj)) obj.forEach(walk);
    }
    walk(data);
    return [...emojis];
  }

  function collectImageUrls(data) {
    const urls = new Set();
    function walk(obj) {
      if (!obj) return;
      if (typeof obj === 'object') {
        if (obj.imageUrl) urls.add(obj.imageUrl);
        Object.values(obj).forEach(walk);
      }
      if (Array.isArray(obj)) obj.forEach(walk);
    }
    walk(data);
    return [...urls];
  }

  async function fetchImage(url) {
    try {
      const res = await fetch(url);
      const buf = await res.arrayBuffer();
      return Array.from(new Uint8Array(buf));
    } catch { return null; }
  }

  // ─────────────────────────────────────────────────────────────
  // Markdown → JSON parser (v1)
  // Schema: see DECK-WORKFLOW.md § Markdown Input
  // ─────────────────────────────────────────────────────────────
  function parseMarkdown(md) {
    const text = md.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    const sections = text.split(/^\s*---+\s*$/m).map(s => s.trim()).filter(Boolean);

    let deckName = '';
    const slides = [];

    for (const section of sections) {
      const lines = section.split('\n');
      const hasSlideHeader = lines.some(l => /^##\s/.test(l));
      const deckHeaderLine = lines.find(l => /^#\s/.test(l));

      if (!hasSlideHeader && deckHeaderLine && !deckName) {
        deckName = deckHeaderLine.replace(/^#\s+/, '').trim();
        continue;
      }

      const slide = parseSlideSection(lines);
      if (slide) slides.push(slide);
    }

    if (slides.length === 0) throw new Error('No slides found in markdown');
    if (slides.length === 1 && !deckName) return slides[0];
    return { type: 'full-deck', name: deckName || 'Deck', slides };
  }

  function parseSlideSection(lines) {
    const headerIdx = lines.findIndex(l => /^##\s/.test(l));
    if (headerIdx === -1) return null;

    const headerLine = lines[headerIdx].replace(/^##\s+/, '').trim();
    const body = lines.slice(headerIdx + 1);

    if (/^splash\s*:/i.test(headerLine)) {
      return parseSplashSlide(headerLine, body);
    }

    let eyebrow = '';
    let headline = headerLine;
    const match = headerLine.match(/^(.+?)\s*::\s*(.+)$/) || headerLine.match(/^(.+?)\s*:\s*(.+)$/);
    if (match) {
      eyebrow = match[1].trim();
      headline = match[2].trim();
    }

    return parseContentSlide(eyebrow, headline, body);
  }

  function parseSplashSlide(headerLine, bodyLines) {
    const vm = headerLine.match(/^splash\s*:\s*(.+)$/i);
    let variant = vm ? vm[1].trim() : 'name_top';
    if (variant === 'cover') variant = 'name_top';
    else if (variant === 'closing') variant = 'email_top';

    const slide = { type: 'splash', variant, title: [], presenter: {} };

    for (const raw of bodyLines) {
      const line = raw.trim();
      if (!line) continue;
      const kv = line.match(/^([\w-]+)\s*:\s*(.+)$/);
      if (!kv) continue;
      const key = kv[1].toLowerCase();
      const value = kv[2].trim();

      if (key === 'title') slide.title.push(value);
      else if (key === 'subtitle') slide.subtitle = value;
      else if (key === 'presenter') slide.presenter.name = value;
      else if (key === 'email') slide.presenter.email = value;
      else if (key === 'titlecolor') slide.titleColor = value;
    }

    return slide;
  }

  function parseContentSlide(eyebrow, headline, bodyLines) {
    const slide = { type: 'custom', eyebrow, headline, rows: [] };
    let currentPrimitive = null;
    let currentCards = [];
    let leadSubtitle = '', leadBody = '', leadPosition = '';
    let bannerText = '', bannerAccent = '';
    let customType = null;
    let footerBarCells = null;

    const flushCards = () => {
      if (currentCards.length > 0) {
        slide.rows.push({ cards: currentCards });
        currentCards = [];
      }
      currentPrimitive = null;
    };

    for (let i = 0; i < bodyLines.length; i++) {
      const line = bodyLines[i].trim();
      if (!line) continue;

      const h3 = line.match(/^###\s+(.+)$/);
      if (h3) {
        flushCards();
        currentPrimitive = h3[1].trim().toLowerCase();
        continue;
      }

      const li = line.match(/^[-*]\s+(.+)$/);
      if (li) {
        const content = li[1];
        appendListItem(currentPrimitive, currentCards, content, slide, footerBarCells);
        continue;
      }

      const kv = line.match(/^([\w-]+)\s*:\s*(.+)$/);
      if (kv) {
        const key = kv[1].toLowerCase();
        const value = kv[2].trim();

        if (key === 'accent') slide.accentWord = value;
        else if (key === 'type') customType = value;
        else if (key === 'lead') leadBody = value;
        else if (key === 'lead-subtitle') leadSubtitle = value;
        else if (key === 'lead-position') leadPosition = value;
        else if (key === 'banner') bannerText = value;
        else if (key === 'banner-accent') bannerAccent = value;
        continue;
      }
    }

    flushCards();

    if (customType) slide.type = customType;

    if (slide.type === 'icon-card-grid' || slide.type === 'stat-card-grid') {
      const allCards = slide.rows.flatMap(r => r.cards);
      delete slide.rows;
      slide.cards = allCards;
    }

    if (leadBody || leadSubtitle || leadPosition) {
      slide.lead = {};
      if (leadSubtitle) slide.lead.subtitle = leadSubtitle;
      if (leadBody) slide.lead.body = leadBody;
      if (leadPosition) slide.lead.position = leadPosition;
    }

    if (bannerText) {
      let text = bannerText;
      let accentPart = bannerAccent;
      if (!accentPart) {
        const m = text.match(/\*\*(.+?)\*\*/);
        if (m) accentPart = m[1];
      }
      text = text.replace(/\*\*(.+?)\*\*/g, '$1');
      slide.footer = { primitive: 'dark-banner', text, accentPart: accentPart || '' };
    }

    return slide;
  }

  function appendListItem(primitive, cards, content, slide, footerBarCells) {
    const parts = content.split('|').map(s => s.trim());

    if (primitive === 'stat-row') {
      let card = cards.find(c => c.primitive === 'stat-row');
      if (!card) {
        card = { primitive: 'stat-row', title: '', values: [] };
        cards.push(card);
      }
      const value = { stat: parts[0] || '', label: parts[1] || '' };
      if (parts[2] === 'accent' || parts[2] === '★') value.accent = true;
      card.values.push(value);
      return;
    }

    if (primitive === 'stat-hero') {
      cards.push({ primitive: 'stat-hero', title: parts[0] || '', stat: parts[1] || '', sub: parts[2] || '' });
      return;
    }

    if (primitive === 'stat-card') {
      cards.push({ primitive: 'stat-card', title: parts[0] || '', sub: parts[1] || '', label: parts[2] || '', stat: parts[3] || '' });
      return;
    }

    if (primitive === 'bullet') {
      let card = cards.find(c => c.primitive === 'bullet');
      if (!card) {
        card = { primitive: 'bullet', title: '', items: [] };
        cards.push(card);
      }
      card.items.push(content);
      return;
    }

    if (primitive === 'person') {
      const highlights = (parts[2] || '').split(',').map(s => s.trim()).filter(Boolean);
      cards.push({ primitive: 'person', name: parts[0] || '', role: parts[1] || '', highlights });
      return;
    }

    if (primitive === 'labeled-list') {
      let card = cards.find(c => c.primitive === 'labeled-list');
      if (!card) {
        card = { primitive: 'labeled-list', title: '', groups: [] };
        cards.push(card);
      }
      const items = (parts[1] || '').split(',').map(s => s.trim()).filter(Boolean);
      card.groups.push({ label: parts[0] || '', items });
      return;
    }

    // Default: icon-card style (emoji optional)
    const emojiMatch = content.match(/^:([\w-]+):\s*(.+)$/);
    if (emojiMatch) {
      const rest = emojiMatch[2].split('|').map(s => s.trim());
      cards.push({ emoji: emojiMatch[1], title: rest[0] || '', body: rest[1] || '' });
    } else {
      cards.push({ title: parts[0] || '', body: parts[1] || '' });
    }
  }

  function detectFormat(text) {
    const trimmed = text.trim();
    if (!trimmed) return 'empty';
    if (trimmed.startsWith('{') || trimmed.startsWith('[')) return 'json';
    return 'markdown';
  }

  function sanitizeJson(text) {
    // 1. Remove invisible/control chars (keep \n \r \t)
    let s = text.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F\u200B\u200C\u200D\u2060\uFEFF\u00AD]/g, '');
    // 2. Fix raw newlines inside JSON strings: replace actual newlines between quotes with \\n
    // Strategy: parse-safe approach — try as-is, if fail then flatten
    try { JSON.parse(s); return s; } catch {}
    // Flatten: collapse all whitespace to single spaces
    s = s.replace(/\r?\n/g, ' ').replace(/\t/g, ' ').replace(/ +/g, ' ');
    return s;
  }

  document.getElementById('generate').addEventListener('click', async () => {
    const rawInput = document.getElementById('json').value;
    const format = detectFormat(rawInput);
    let data;
    try {
      if (format === 'empty') throw new Error('입력이 비어있습니다');
      if (format === 'json') {
        data = JSON.parse(sanitizeJson(rawInput));
      } else {
        data = parseMarkdown(rawInput);
      }
      const emojiNames = collectEmojis(data);
      const emojiBytes = {};
      for (const name of emojiNames) {
        const bytes = await fetchEmoji(name);
        if (bytes) emojiBytes[name] = bytes;
      }
      const imageUrls = collectImageUrls(data);
      const imageBytes = {};
      for (const url of imageUrls) {
        const bytes = await fetchImage(url);
        if (bytes) imageBytes[url] = bytes;
      }
      parent.postMessage({ pluginMessage: { type: 'generate', data, emojiBytes, imageBytes } }, '*');
    } catch (err) {
      const prefix = format === 'markdown' ? 'Invalid Markdown: ' : 'Invalid JSON: ';
      parent.postMessage({ pluginMessage: { type: 'error', message: prefix + err.message } }, '*');
    }
  });
</script>
